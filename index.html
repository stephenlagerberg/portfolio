<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Altitude Consulting | Stephen E. Lagerberg, Ph.D.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #0b1f3f; --secondary: #1a5f7a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdfdfd; }
    </style>
</head>
<body class="text-zinc-900">

    <nav class="bg-[#0b1f3f] text-white p-5 flex justify-between items-center shadow-lg">
        <div class="font-bold uppercase tracking-widest text-zinc-400">Mental Altitude Consulting</div>
    </nav>

    <section id="chrono" class="py-12 px-5 max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold text-center mb-8 text-[#0b1f3f]">Performance-Adjusted Chronograph</h2>
        
        <div class="bg-zinc-900 text-white p-8 rounded-2xl shadow-2xl border border-zinc-700">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <label class="text-xs uppercase font-bold text-zinc-400">Shift Start Hour (0-23)</label>
                    <input type="number" id="shiftStart" value="23" min="0" max="23" class="w-full bg-zinc-800 p-3 rounded border border-zinc-700" oninput="calculateBioStatus()">
                    
                    <label class="text-xs uppercase font-bold text-zinc-400 block">MBI Exhaustion Score</label>
                    <input type="range" id="mbiExhaustion" min="0" max="100" value="50" class="w-full" oninput="calculateBioStatus()">
                </div>

                <div class="bg-zinc-800 p-6 rounded-xl border border-zinc-700">
                    <div id="statusIndicator" class="text-xs uppercase font-bold tracking-widest mb-2">Stable</div>
                    <div id="performanceDisplay" class="text-4xl font-mono text-white mb-1">100%</div>
                    <div id="restAdvice" class="text-sm font-semibold text-emerald-400 italic mb-2">Optimal window active.</div>
                    <p id="performanceAdvice" class="text-xs text-zinc-400">Input your metrics to generate your rest protocol.</p>
                </div>
            </div>

            <div class="mt-8 border-t border-zinc-700 pt-6">
                <h4 class="text-zinc-400 text-xs uppercase font-bold mb-4">Calculated Risk/Rest Curve</h4>
                <div id="riskChart" class="flex items-end h-24 gap-1 w-full bg-zinc-950 p-2 rounded">
                    <!-- Dynamic chart bars injected here -->
                </div>
            </div>
        </div>
    </section>

    <script>
        function calculateBioStatus() {
            const shift = parseInt(document.getElementById('shiftStart').value);
            const fatigue = parseInt(document.getElementById('mbiExhaustion').value);
            const now = new Date().getHours();
            
            // Performance logic
            const isNight = now >= 1 && now <= 5;
            let performance = 100 - (isNight ? 35 : 0) - (fatigue * 0.5);
            performance = Math.max(0, Math.floor(performance));
            
            const display = document.getElementById('performanceDisplay');
            const status = document.getElementById('statusIndicator');
            const advice = document.getElementById('performanceAdvice');
            const rest = document.getElementById('restAdvice');

            display.innerText = performance + "%";
            
            // Dynamic Risk/Rest Logic
            if (performance < 50) {
                status.innerText = "High Friction Risk";
                status.className = "text-xs uppercase font-bold tracking-widest mb-2 text-red-500";
                advice.innerText = "Immediate strategic disengagement required. Potential for cognitive failure.";
                rest.innerText = "Rest Protocol: 15-min tactical nap.";
            } else if (performance < 75) {
                status.innerText = "Fatigue Threshold";
                status.className = "text-xs uppercase font-bold tracking-widest mb-2 text-amber-500";
                advice.innerText = "Performance degraded. Avoid high-stakes decision-making.";
                rest.innerText = "Rest Protocol: 5-min cognitive break.";
            } else {
                status.innerText = "Operational Peak";
                status.className = "text-xs uppercase font-bold tracking-widest mb-2 text-emerald-400";
                advice.innerText = "Peak operational window. Execute complex tasks now.";
                rest.innerText = "Rest Protocol: Normal ops.";
            }

            // Generate Risk Curve Visual
            const chart = document.getElementById('riskChart');
            chart.innerHTML = '';
            for(let i=0; i<24; i++) {
                const bar = document.createElement('div');
                const height = Math.random() * 40 + 40; // Simulated risk curve
                bar.style.height = `${height}%`;
                bar.className = height > 70 ? 'flex-1 bg-red-500' : 'flex-1 bg-emerald-500';
                chart.appendChild(bar);
            }
        }
        calculateBioStatus();
    </script>
</body>
</html>
